name: Update fuel prices

on:
  schedule:
    # Run at 5 minutes past every hour
    - cron: '5 * * * *'
  workflow_dispatch:  # allow manual triggering from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./scripts
        run: npm ci

      - name: Debug credentials presence
        env:
          FUEL_FINDER_CLIENT_ID_LEN: ${{ secrets.FUEL_FINDER_CLIENT_ID }}
          FUEL_FINDER_CLIENT_SECRET_LEN: ${{ secrets.FUEL_FINDER_CLIENT_SECRET }}
        run: |
          if [ -z "${{ secrets.FUEL_FINDER_CLIENT_ID }}" ]; then
            echo "❌ FUEL_FINDER_CLIENT_ID is EMPTY"
          else
            echo "✅ FUEL_FINDER_CLIENT_ID is set (length: ${#FUEL_FINDER_CLIENT_ID_LEN} chars)"
          fi
          if [ -z "${{ secrets.FUEL_FINDER_CLIENT_SECRET }}" ]; then
            echo "❌ FUEL_FINDER_CLIENT_SECRET is EMPTY"
          else
            echo "✅ FUEL_FINDER_CLIENT_SECRET is set (length: ${#FUEL_FINDER_CLIENT_SECRET_LEN} chars)"
          fi

      - name: Fetch fuel prices
        working-directory: ./scripts
        env:
          FUEL_FINDER_CLIENT_ID: ${{ secrets.FUEL_FINDER_CLIENT_ID }}
          FUEL_FINDER_CLIENT_SECRET: ${{ secrets.FUEL_FINDER_CLIENT_SECRET }}
        run: npm run update-prices

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fuel-prices.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update fuel prices [skip ci]"
            git push
          fi